version: '3.8'

services:
  # 企业官网服务（支持 Docker Compose Watch 自动同步）
  hyx-website:
    build:
      context: .
      dockerfile: Dockerfile
    image: hyx-website:latest
    container_name: hyx-website
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 挂载网站文件（Watch 模式自动同步）
      - ./html:/usr/share/nginx/html:rw
      - ./logs:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    networks:
      - hyx-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    develop:
      watch:
        # 静态文件同步模式
        - path: ./html/
          action: sync
          target: /usr/share/nginx/html
          ignore:
            - logs/
            - .git/
            - node_modules/
        # Nginx 配置文件同步
        - path: ./nginx-docker.conf
          action: sync+restart
          target: /etc/nginx/conf.d/default.conf

  # HTTPS 反向代理（可选，需要配置 SSL 证书）
  # hyx-https:
  #   image: nginx:alpine
  #   container_name: hyx-https
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./ssl:/etc/nginx/ssl:ro
  #     - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - hyx-website
  #   networks:
  #     - hyx-network

networks:
  hyx-network:
    driver: bridge

# 数据卷（可选）
volumes:
  logs: