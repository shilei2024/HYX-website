version: '3.8'

services:
  # 企业官网服务
  hyx-website:
    build:
      context: .
      dockerfile: Dockerfile
    image: hyx-website:latest
    container_name: hyx-website
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 挂载本地配置（可选，便于开发调试）
      # - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    networks:
      - hyx-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # HTTPS 反向代理（可选，需要配置 SSL 证书）
  # hyx-https:
  #   image: nginx:alpine
  #   container_name: hyx-https
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./ssl:/etc/nginx/ssl:ro
  #     - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - hyx-website
  #   networks:
  #     - hyx-network

networks:
  hyx-network:
    driver: bridge

# 数据卷（可选）
volumes:
  logs: