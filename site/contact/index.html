<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <meta name="description" content="联系我们 - 业务咨询、全球据点、意见反馈">
  <title>联系我们 - 弘易芯科技</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="hyx-header"></header>

  <div class="page-hero">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="../index.html" data-i18n="nav.home">首页</a></li>
        <li class="breadcrumb-item active" data-i18n="nav.contact">联系我们</li>
      </ol>
      <h1 data-i18n="contact.title">联系我们</h1>
      <p class="mb-0 opacity-90" data-i18n="contact.subtitle">业务咨询、全球据点、意见反馈</p>
    </div>
  </div>

  <main class="py-5">
    <div class="container">
      <div class="row g-4 mb-5" id="contact-cards"></div>

      <div class="row">
        <div class="col-lg-6 mb-4">
          <h2 class="h5 fw-bold mb-3" data-i18n="contact.locations">全球据点</h2>
          <ul class="list-unstyled" id="locations-list"></ul>
        </div>
        <div class="col-lg-6">
          <h2 class="h5 fw-bold mb-3" data-i18n="contact.feedback">意见反馈</h2>
          <form id="feedback-form">
            <div class="mb-3">
              <label for="name" class="form-label"><span data-i18n="contact.name">姓名</span> <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="name" name="name" required data-placeholder="contact.namePlaceholder">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label"><span data-i18n="contact.emailLabel">邮箱</span> <span class="text-danger">*</span></label>
              <input type="email" class="form-control" id="email" name="email" required data-placeholder="contact.emailPlaceholder">
            </div>
            <div class="mb-3">
              <label for="subject" class="form-label" data-i18n="contact.subject">主题</label>
              <select class="form-select" id="subject" name="subject">
                <option value="business" data-i18n="contact.subjectBusiness">业务咨询</option>
                <option value="product" data-i18n="contact.subjectProduct">产品询价</option>
                <option value="feedback" data-i18n="contact.subjectFeedback">意见反馈</option>
                <option value="other" data-i18n="contact.subjectOther">其他</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="message" class="form-label"><span data-i18n="contact.message">留言</span> <span class="text-danger">*</span></label>
              <textarea class="form-control" id="message" name="message" rows="4" required data-placeholder="contact.messagePlaceholder"></textarea>
            </div>
            <div id="feedback-form-msg" class="small text-danger mb-2" style="display:none;"></div>
            <button type="submit" class="btn btn-hyx-primary" id="feedback-submit-btn" data-i18n="contact.submit">提交</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="hyx-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', function() {
      if (!window.HYXRenderer || !window.HYXData) return;
      var cardsContainer = document.getElementById('contact-cards');
      if (cardsContainer) HYXRenderer.renderContactCards(cardsContainer);
      var locationsContainer = document.getElementById('locations-list');
      var locations = HYXData.config && HYXData.config.locations ? HYXData.config.locations : [];
      if (locationsContainer && locations.length > 0) HYXRenderer.renderLocations(locationsContainer, locations);

      var form = document.getElementById('feedback-form');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          var formId = HYXData.config && HYXData.config.contact && HYXData.config.contact.formspreeFormId;
          if (!formId || !formId.trim()) {
            var msgEl = document.getElementById('feedback-form-msg');
            if (msgEl) { msgEl.style.display = 'block'; msgEl.textContent = '请先在 data/config.json 的 contact.formspreeFormId 中配置 Formspree 表单 ID（在 formspree.io 免费注册获取）。'; }
            return;
          }
          var btn = document.getElementById('feedback-submit-btn');
          var msgEl = document.getElementById('feedback-form-msg');
          if (msgEl) msgEl.style.display = 'none';
          if (btn) { btn.disabled = true; btn.textContent = '提交中…'; }
          var subjectEl = document.getElementById('subject');
          var subjectLabel = subjectEl && subjectEl.options[subjectEl.selectedIndex] ? subjectEl.options[subjectEl.selectedIndex].text : '';
          var fd = new FormData(form);
          fd.set('_subject', '【弘易芯官网】' + (subjectLabel || fd.get('subject') || ''));
          fetch('https://formspree.io/f/' + formId.trim(), {
            method: 'POST',
            body: fd,
            headers: { 'Accept': 'application/json' }
          }).then(function(r) {
            if (r.ok) {
              window.location.href = 'success.html';
            } else {
              if (btn) { btn.disabled = false; btn.textContent = (window.HYXUtils && window.HYXUtils.getT('contact.submit')) || '提交'; }
              if (msgEl) { msgEl.style.display = 'block'; msgEl.textContent = '提交失败，请稍后重试。'; }
            }
          }).catch(function() {
            if (btn) { btn.disabled = false; btn.textContent = (window.HYXUtils && window.HYXUtils.getT('contact.submit')) || '提交'; }
            if (msgEl) { msgEl.style.display = 'block'; msgEl.textContent = '网络错误，请稍后重试。'; }
          });
        });
      }
    });
  </script>
</body>
</html>
