<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../../assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../../assets/logo.png">
  <meta name="description" content="News - Company News, Industry Updates, Technical Articles">
  <title>News - HYIC Technology Co., Ltd.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="hyx-header"></header>

  <div class="page-hero">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="../../index.html">Home</a></li>
        <li class="breadcrumb-item active" data-i18n="nav.news">News</li>
      </ol>
      <h1 data-i18n="news.title">News</h1>
      <p class="mb-0 opacity-90" data-i18n="news.subtitle">Company News, Industry Updates, Technical Articles</p>
    </div>
  </div>

  <main class="py-5">
    <div class="container">
      <ul class="nav nav-pills mb-4" id="news-tabs"></ul>
      <div id="news-list"></div>
    </div>
  </main>

  <footer class="site-footer" id="hyx-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/components.js"></script>
  <script src="../../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', async function() {
      if (!window.HYXRenderer) return;
      
      const urlParams = new URLSearchParams(window.location.search);
      const currentType = urlParams.get('type') || '';
      
      const newsData = await HYXRenderer.loadNews();
      
      const tabsContainer = document.getElementById('news-tabs');
      if (tabsContainer) {
        HYXRenderer.renderNewsTabs(tabsContainer, newsData.types, currentType);
      }
      
      let news = newsData.news;
      if (currentType) {
        news = news.filter(n => n.type === currentType);
      }
      
      const listContainer = document.getElementById('news-list');
      if (listContainer) {
        HYXRenderer.renderNewsCards(listContainer, news, '../../');
      }
    });
  </script>
</body>
</html>
