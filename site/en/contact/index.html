<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../../assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../../assets/logo.png">
  <meta name="description" content="Contact Us - Business Inquiries, Global Locations, Feedback">
  <title>Contact Us - HYIC Technology Co., Ltd.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="hyx-header"></header>

  <div class="page-hero">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="../index.html" data-i18n="nav.home">Home</a></li>
        <li class="breadcrumb-item active" data-i18n="nav.contact">Contact</li>
      </ol>
      <h1 data-i18n="contact.title">Contact Us</h1>
      <p class="mb-0 opacity-90" data-i18n="contact.subtitle">Business Inquiries, Global Locations, Feedback</p>
    </div>
  </div>

  <main class="py-5">
    <div class="container">
      <div class="row g-4 mb-5" id="contact-cards"></div>

      <div class="row">
        <div class="col-lg-6 mb-4">
          <h2 class="h5 fw-bold mb-3" data-i18n="contact.locations">Global Locations</h2>
          <ul class="list-unstyled" id="locations-list"></ul>
        </div>
        <div class="col-lg-6">
          <h2 class="h5 fw-bold mb-3" data-i18n="contact.feedback">Feedback</h2>
          <form id="feedback-form">
            <div class="mb-3">
              <label for="name" class="form-label"><span data-i18n="contact.name">Name</span> <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="name" required data-placeholder="contact.namePlaceholder">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label"><span data-i18n="contact.emailLabel">Email</span> <span class="text-danger">*</span></label>
              <input type="email" class="form-control" id="email" required data-placeholder="contact.emailPlaceholder">
            </div>
            <div class="mb-3">
              <label for="subject" class="form-label" data-i18n="contact.subject">Subject</label>
              <select class="form-select" id="subject">
                <option value="business" data-i18n="contact.subjectBusiness">Business Inquiry</option>
                <option value="product" data-i18n="contact.subjectProduct">Product Inquiry</option>
                <option value="feedback" data-i18n="contact.subjectFeedback">Feedback</option>
                <option value="other" data-i18n="contact.subjectOther">Other</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="message" class="form-label"><span data-i18n="contact.message">Message</span> <span class="text-danger">*</span></label>
              <textarea class="form-control" id="message" rows="4" required data-placeholder="contact.messagePlaceholder"></textarea>
            </div>
            <button type="submit" class="btn btn-hyx-primary" data-i18n="contact.submit">Submit</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="hyx-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/components.js"></script>
  <script src="../../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', function() {
      if (!window.HYXRenderer || !window.HYXData) return;
      
      const cardsContainer = document.getElementById('contact-cards');
      if (cardsContainer) {
        HYXRenderer.renderContactCards(cardsContainer);
      }
      
      const locationsContainer = document.getElementById('locations-list');
      const locations = HYXData.config?.locations || [];
      if (locationsContainer && locations.length > 0) {
        HYXRenderer.renderLocations(locationsContainer, locations);
      }
      
      document.getElementById('feedback-form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Thank you for your feedback! We will get back to you soon.');
      });
    });
  </script>
</body>
</html>
