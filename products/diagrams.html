<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <meta name="description" content="应用框图 - 智能穿戴、电源转接、电机驱动等方案参考">
  <title>应用框图 - 产品中心 - 弘易芯科技</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="hyx-header"></header>

  <div class="page-hero">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../index.html" data-i18n="nav.home">首页</a></li>
          <li class="breadcrumb-item"><a href="distribution.html" data-i18n="nav.products">产品中心</a></li>
          <li class="breadcrumb-item active" aria-current="page" data-i18n="nav.dropdown.diagrams">应用框图</li>
        </ol>
      </nav>
      <h1 data-i18n="nav.dropdown.diagrams">应用框图</h1>
      <p class="mb-0 opacity-90" data-i18n="diagrams.subtitle">智能穿戴、电源转接、电机驱动等方案参考</p>
    </div>
  </div>

  <main class="content-section py-5">
    <div class="container">
      <div class="row">
        <div class="col-lg-4 col-xl-3 mb-4 mb-lg-0">
          <div class="list-group diagram-sidebar" id="diagram-sidebar"></div>
        </div>
        <div class="col-lg-8 col-xl-9">
          <div id="diagram-content"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="hyx-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', async function() {
      if (!window.HYXRenderer || !HYXRenderer.loadDiagramCategories || !HYXRenderer.renderDiagramPage || !HYXRenderer.updateDiagramContent) return;
      var basePath = (window.HYXUtils && window.HYXUtils.getBasePath) ? window.HYXUtils.getBasePath() : '../';
      var categories = await HYXRenderer.loadDiagramCategories();
      var sidebarEl = document.getElementById('diagram-sidebar');
      var contentEl = document.getElementById('diagram-content');
      HYXRenderer.renderDiagramPage(sidebarEl, contentEl, categories, basePath);

      // 点击左侧标签时，右侧只显示对应分类的框图
      if (sidebarEl && contentEl && categories.length) {
        sidebarEl.querySelectorAll('.diagram-nav-item').forEach(function(link) {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            var id = this.getAttribute('data-id');
            var cat = categories.find(function(c) { return c.id === id; });
            if (!cat) return;
            sidebarEl.querySelectorAll('.diagram-nav-item').forEach(function(el) { el.classList.remove('active'); });
            this.classList.add('active');
            HYXRenderer.updateDiagramContent(contentEl, cat, basePath);
          });
        });
      }
    });
  </script>
</body>
</html>
