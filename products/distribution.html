<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <meta name="description" content="分销品牌 - 弘易芯科技分销产品分类，电容电阻电感IC等">
  <title>分销品牌 - 弘易芯科技</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="hyx-header"></header>

  <div class="page-hero">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../index.html" data-i18n="nav.home">首页</a></li>
          <li class="breadcrumb-item"><a href="index.html" data-i18n="nav.products">产品中心</a></li>
          <li class="breadcrumb-item active" aria-current="page" data-i18n="nav.dropdown.distribution">分销品牌</li>
        </ol>
      </nav>
      <h1 data-i18n="nav.dropdown.distribution">分销品牌</h1>
      <p class="mb-0 opacity-90" data-i18n="products.distributionSubtitle">分销产品分类，点击进入对应品类产品列表</p>
    </div>
  </div>

  <main class="py-5">
    <div class="container">
      <div id="distribution-container"></div>
    </div>
  </main>

  <footer class="site-footer" id="hyx-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', async function() {
      if (!window.HYXRenderer || !HYXRenderer.loadDistributionBrands || !HYXRenderer.renderDistributionBrandCards) return;
      var data = await HYXRenderer.loadDistributionBrands();
      var container = document.getElementById('distribution-container');
      if (container) HYXRenderer.renderDistributionBrandCards(container, data.brands || []);
    });
  </script>
</body>
</html>
