<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <meta name="description" content="产品中心 - 弘易芯科技分销产品列表">
  <title>产品列表 - 弘易芯科技</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="hyx-header"></header>

  <div class="page-hero" id="product-list-hero">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../index.html" data-i18n="nav.home">首页</a></li>
          <li class="breadcrumb-item"><a href="distribution.html" data-i18n="nav.products">产品中心</a></li>
          <li class="breadcrumb-item"><a href="distribution.html" data-i18n="nav.dropdown.distribution">分销品牌</a></li>
          <li class="breadcrumb-item active" aria-current="page" id="hero-cat-name">—</li>
        </ol>
      </nav>
      <h1 id="hero-title">产品列表</h1>
      <p class="mb-0 opacity-90" id="hero-desc">—</p>
    </div>
  </div>

  <main class="py-5">
    <div class="container">
      <div id="product-list"></div>
    </div>
  </main>

  <footer class="site-footer" id="hyx-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', async function() {
      var urlParams = new URLSearchParams(window.location.search);
      var currentCat = urlParams.get('cat') || '';
      if (!currentCat) {
        window.location.replace('distribution.html');
        return;
      }
      if (!window.HYXRenderer) return;
      var productData = await HYXRenderer.loadProducts();
      var cat = (productData.categories || []).find(function(c) { return c.id === currentCat; });
      var lang = window.HYXData && window.HYXData.lang ? window.HYXData.lang : 'zh';
      var nameKey = lang === 'zh' ? 'name' : 'nameEn';
      var descKey = lang === 'zh' ? 'description' : 'descriptionEn';
      var catName = cat ? (cat[nameKey] || cat.name) : currentCat;
      var catDesc = cat ? (cat[descKey] || cat.description || '') : '';
      var heroTitle = document.getElementById('hero-title');
      var heroCatName = document.getElementById('hero-cat-name');
      var heroDesc = document.getElementById('hero-desc');
      if (heroTitle) heroTitle.textContent = catName;
      if (heroCatName) heroCatName.textContent = catName;
      if (heroDesc) heroDesc.textContent = catDesc;

      var products = (productData.products || []).filter(function(p) { return p.category === currentCat; });
      var listContainer = document.getElementById('product-list');
      if (listContainer) HYXRenderer.renderProductCards(listContainer, products, '../');
    });
  </script>
</body>
</html>
