<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <meta name="description" content="???? - ??????????????????IC">
  <title>???? - ????????????</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="hyx-header"></header>

  <main class="py-5">
    <div class="container">
      <div class="row">
        <aside class="col-lg-3 mb-4 mb-lg-0">
          <div class="product-sidebar" id="product-sidebar"></div>
        </aside>
        <div class="col-lg-9">
          <h1 class="h4 mb-4 fw-bold" data-i18n="products.title">????</h1>
          <div id="product-list"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="hyx-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', async function() {
      if (!window.HYXRenderer) return;
      var urlParams = new URLSearchParams(window.location.search);
      var currentCat = urlParams.get('cat') || '';
      var productData = await HYXRenderer.loadProducts();
      var sidebar = document.getElementById('product-sidebar');
      if (sidebar) HYXRenderer.renderProductSidebar(sidebar, productData.categories, currentCat);
      var products = productData.products;
      if (currentCat) products = products.filter(function(p) { return p.category === currentCat; });
      var listContainer = document.getElementById('product-list');
      if (listContainer) HYXRenderer.renderProductCards(listContainer, products, '../');
    });
  </script>
</body>
</html>
