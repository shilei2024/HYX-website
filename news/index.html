  <script src="../js/components.js"></script>
  <script src="../js/data-loader.js"></script>
  <script>
    document.addEventListener('hyx-components-ready', async function() {
      if (!window.HYXRenderer) return;
      var urlParams = new URLSearchParams(window.location.search);
      var currentType = urlParams.get('type') || '';
      var newsData = await HYXRenderer.loadNews();
      var tabsContainer = document.getElementById('news-tabs');
      if (tabsContainer) HYXRenderer.renderNewsTabs(tabsContainer, newsData.types, currentType);
      var news = newsData.news;
      if (currentType) news = news.filter(function(n) { return n.type === currentType; });
      var listContainer = document.getElementById('news-list');
      if (listContainer) HYXRenderer.renderNewsCards(listContainer, news, '../');
    });
  </script>
