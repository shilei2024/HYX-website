# 弘易芯科技官网 - HTTPS 部署（80 + 443，SSL 证书）
# 使用前请将证书放入 ssl/ 并修改 nginx-https.conf 中的 server_name

version: '3.8'

services:
  hyx-website:
    build:
      context: .
      dockerfile: Dockerfile
    image: hyx-website:latest
    container_name: hyx-website
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    networks:
      - hyx-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  hyx-network:
    driver: bridge
