<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <title>诊断页面 - 检查数据加载</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .test-item { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
    pre { background: #f5f5f5; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>🔍 网站诊断页面</h1>
  
  <div class="test-item">
    <h3>1. 基本信息</h3>
    <div id="test1"></div>
  </div>
  
  <div class="test-item">
    <h3>2. 语言检测</h3>
    <div id="test2"></div>
  </div>
  
  <div class="test-item">
    <h3>3. 数据文件加载测试</h3>
    <div id="test3"></div>
  </div>
  
  <div class="test-item">
    <h3>4. 导航栏渲染测试</h3>
    <div id="test4"></div>
  </div>

  <script>
    // 测试 1: 基本信息
    const test1 = document.getElementById('test1');
    test1.innerHTML = `
      <p><strong>当前 URL:</strong> ${window.location.href}</p>
      <p><strong>Pathname:</strong> ${window.location.pathname}</p>
      <p><strong>HTML Lang:</strong> ${document.documentElement.lang}</p>
    `;
    
    // 测试 2: 语言检测
    const test2 = document.getElementById('test2');
    const path = window.location.pathname;
    const htmlLang = (document.documentElement.lang || 'zh-CN').toLowerCase();
    
    let detectedLang = 'zh';
    if (path.includes('/en/') || path.startsWith('/en') || htmlLang.startsWith('en')) {
      detectedLang = 'en';
    } else if (path.includes('/ru/') || path.startsWith('/ru') || htmlLang.startsWith('ru')) {
      detectedLang = 'ru';
    }
    
    test2.innerHTML = `
      <p><strong>路径检测:</strong> ${path}</p>
      <p><strong>HTML Lang 检测:</strong> ${htmlLang}</p>
      <p><strong>最终语言:</strong> ${detectedLang}</p>
    `;
    
    // 测试 3: 数据文件加载
    const test3 = document.getElementById('test3');
    test3.innerHTML = '<p class="info">正在加载数据文件...</p>';
    
    async function testDataFiles() {
      const basePath = './';
      let results = [];
      
      // 测试 config.json
      try {
        const configResp = await fetch(basePath + 'data/config.json');
        const config = await configResp.json();
        results.push(`<p class="success">✓ config.json 加载成功</p>`);
        results.push(`<p><strong>公司名称:</strong> ${config.site.name}</p>`);
        results.push(`<p><strong>联系人:</strong> ${config.contact.contactPerson}</p>`);
      } catch (e) {
        results.push(`<p class="error">✗ config.json 加载失败：${e.message}</p>`);
      }
      
      // 测试 i18n/zh.json
      try {
        const i18nResp = await fetch(basePath + 'data/i18n/' + detectedLang + '.json');
        const i18n = await i18nResp.json();
        results.push(`<p class="success">✓ i18n/${detectedLang}.json 加载成功</p>`);
        results.push(`<p><strong>导航 - 首页:</strong> ${i18n.nav.home}</p>`);
        results.push(`<p><strong>导航 - 产品:</strong> ${i18n.nav.products}</p>`);
        results.push(`<p><strong>导航 - 关于:</strong> ${i18n.nav.about}</p>`);
        results.push(`<p><strong>导航 - 新闻:</strong> ${i18n.nav.news}</p>`);
        results.push(`<p><strong>导航 - 联系:</strong> ${i18n.nav.contact}</p>`);
      } catch (e) {
        results.push(`<p class="error">✗ i18n/${detectedLang}.json 加载失败：${e.message}</p>`);
      }
      
      test3.innerHTML = results.join('');
    }
    
    testDataFiles();
    
    // 测试 4: 导航栏渲染
    const test4 = document.getElementById('test4');
    test4.innerHTML = '<p class="info">等待数据加载完成...</p>';
    
    testDataFiles().then(() => {
      test4.innerHTML = `
        <p class="info">请在控制台查看导航栏实际渲染结果</p>
        <p>打开浏览器控制台 (F12)，查看是否有错误信息</p>
      `;
    });
  </script>
</body>
</html>
